<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سوق فاتح الذكي</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; margin: 0; padding: 20px; }
        .hero { text-align: center; padding: 40px; background: #2563eb; color: white; border-radius: 20px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .product-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .product-img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; }
        .btn { background: #0f172a; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="hero">
    <h1>سوق فاتح الذكي</h1>
    <p>أفضل المنتجات المختارة</p>
</div>

<div class="products-grid">
    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" class="product-img">
        <h3>ساعة ذكية</h3>
        <button class="btn">شراء</button>
    </div>
    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500" class="product-img">
        <h3>سماعات</h3>
        <button class="btn">شراء</button>
    </div>
    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1557324268-ac4c78484090?w=500" class="product-img">
        <h3>كاميرا ذكية</h3>
        <button class="btn">شراء</button>
    </div>
</div>

</body>
</html>.
