<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <title>Checkout</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Arial;max-width:900px;margin:2rem auto;padding:1rem}
    .hidden{display:none}
    button{padding:.6rem 1rem;margin:.4rem}
    input,button{font-size:1rem}
    #log{white-space:pre-wrap;background:#f7f7f7;padding:.6rem;border-radius:6px}
  </style>
</head>
<body>
  <h1>واجهة الدفع والربط بالـ API</h1>

  <section id="auth">
    <h2>تسجيل الدخول</h2>
    <input id="email" placeholder="email" type="email" />
    <input id="password" placeholder="password" type="password" />
    <button id="btnLogin">تسجيل</button>
  </section>

  <section id="uploader" class="hidden">
    <h2>رفع ملف (Cloudinary)</h2>
    <input id="file" type="file" />
    <button id="btnUpload">رفع</button>
    <div id="uploadResult"></div>
  </section>

  <section id="cart">
    <h2>عربة/طلب تجريبي</h2>
    <textarea id="cartData" rows="4">[{"sku":"demo-001","name":"منتج تجريبي","qty":1,"price":1999}]</textarea>
    <div>
      <button id="btnCreateOrder">إنشاء طلب</button>
      <button id="btnPay" disabled>ادفع الآن</button>
    </div>
    <div id="orderResult"></div>
  </section>

  <h3>سجل الأحداث</h3>
  <div id="log"></div>

  <script>
    // إعدادات: عدّل حسب بيئتك
    const API_BASE = '/api'; // أو https://api.example.com
    // نهاية نقاط مفترضة من الباك‑إند:
    // POST  /auth/login  -> { token }
    // POST  /uploads/sign -> { uploadUrl, fields }  (signed form fields from backend for Cloudinary)
    // POST  /orders -> { id, paymentProvider, clientSecret?, paymentUrl?, paymentToken? }
    // POST  /orders/:id/complete -> { status, receipt }
    // POST  /ai/proxy -> { response }

    // ---- إدارة JWT ----
    function setToken(t){ localStorage.setItem('jwt', t); }
    function getToken(){ return localStorage.getItem('jwt'); }
    function authHeaders(h={}) {
      const token = getToken();
      if(token) h['Authorization']='Bearer '+token;
      return h;
    }

    async function apiFetch(path, opts = {}) {
      const headers = opts.headers || {};
      headers['Content-Type'] = headers['Content-Type'] || 'application/json';
      opts.headers = authHeaders(headers);
      const res = await fetch(API_BASE + path, opts);
      if(!res.ok){
        const txt = await res.text().catch(()=>res.statusText);
        throw new Error(`HTTP ${res.status} ${txt}`);
      }
      const ct = res.headers.get('content-type') || '';
      return ct.includes('application/json') ? res.json() : res.text();
    }

    // ---- تسجيل الدخول للحصول على JWT ----
    document.getElementById('btnLogin').addEventListener('click', async ()=>{
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      log('أحاول تسجيل الدخول...');
      try{
        const data = await apiFetch('/auth/login', {
          method:'POST',
          body: JSON.stringify({ email, password })
        });
        if(data.token){
          setToken(data.token);
          log('تم الحصول على توكن JWT.');
          document.getElementById('uploader').classList.remove('hidden');
        } else throw new Error('لا توكن في الاستجابة.');
      } catch(e){ log('خطأ تسجيل الدخول: '+e.message); }
    });

    // ---- رفع إلى Cloudinary عبر توقيع الباك‑إند ----
    document.getElementById('btnUpload').addEventListener('click', async ()=>{
      const fileInput = document.getElementById('file');
      if(!fileInput.files.length){ log('اختر ملفاً'); return; }
      const file = fileInput.files[0];
      try{
        log('أطلب توقيع الرفع من الباك‑إند...');
        // الباك‑إند يجب أن يُرجع uploadUrl و form fields (مثلاً cloudinary signed upload)
        const sign = await apiFetch('/uploads/sign', {
          method:'POST',
          body: JSON.stringify({ filename: file.name, contentType: file.type })
        });
        // sign: { uploadUrl: "https://api.cloudinary.com/...", fields: { key:..., api_key:..., signature:..., timestamp:... } }
        const form = new FormData();
        Object.entries(sign.fields || {}).forEach(([k,v])=>form.append(k,v));
        form.append('file', file);
        log('أرفع مباشرة إلى Cloudinary...');
        const resp = await fetch(sign.uploadUrl, { method:'POST', body: form });
        const text = await resp.text();
        // عادة Cloudinary يعيد XML أو JSON حسب الطلب؛ باك‑إند يمكن أن يعيد رابط النتيجة بدلنا.
        // هنا نفترض الباك‑إند أعاد لنا URL نهائي بعد التحقق:
        if(sign.resultUrl){
          document.getElementById('uploadResult').innerText = 'URL: ' + sign.resultUrl;
          log('تم الرفع. URL: '+sign.resultUrl);
        } else {
          document.getElementById('uploadResult').innerText = 'Upload response raw: ' + text;
          log('استجابة الرفع: '+text);
        }
      } catch(e){ log('فشل الرفع: '+e.message); }
    });

    // ---- Orders API ----
    async function createOrder(cartItems, meta = {}) {
      log('إنشاء طلب في الباك‑إند...');
      return apiFetch('/orders', {
        method:'POST',
        body: JSON.stringify({ items: cartItems, meta })
      });
    }

    async function finalizeOrder(orderId, paymentToken) {
      log('إكمال الطلب ' + orderId + ' على الباك‑إند...');
      return apiFetch(`/orders/${orderId}/complete`, {
        method:'POST',
        body: JSON.stringify({ paymentToken })
      });
    }

    // زر إنشاء الطلب
    let lastOrder = null;
    document.getElementById('btnCreateOrder').addEventListener('click', async ()=>{
      try{
        const cart = JSON.parse(document.getElementById('cartData').value);
        const order = await createOrder(cart, { source: 'web' });
        lastOrder = order;
        document.getElementById('orderResult').innerText = JSON.stringify(order, null, 2);
        log('تم إنشاء الطلب: ' + (order.id || 'no-id'));
        // تفعيل زر الدفع
        document.getElementById('btnPay').disabled = false;
      }catch(e){ log('خطأ إنشاء الطلب: '+e.message); }
    });

    // ---- تدفق الدفع الآمن ----
    // ملاحظات أمان مهمة (اقرأ الوثيقة المرفقة):
    // - لا ترسل أرقام البطاقات إلى خوادمنا مباشرة. استخدم SDK لمزوّد الدفع (Stripe/PayPal/Checkout).
    // - الباك‑إند يجب أن ينشئ PaymentIntent أو session ويعيد clientSecret أو paymentUrl.
    // - إن لم يتوفر SDK، الباك‑إند يمكن أن يعيد paymentUrl لإعادة التوجيه.
    document.getElementById('btnPay').addEventListener('click', async ()=>{
      if(!lastOrder){ log('لا يوجد طلب لإنهائه.'); return; }
      const order = lastOrder;
      try{
        log('بدء عملية الدفع لطلب #' + order.id);
        // احسب السيناريو حسب استجابة الباك‑إند:
        if(order.paymentUrl){
          log('الباك‑إند أعطى paymentUrl -> إعادة توجيه المستخدم للمزود: ' + order.paymentUrl);
          window.location.href = order.paymentUrl; // إعادة توجيه آمن للمزود
          return;
        }
        // مثال: عند استخدام Stripe، الباك‑إند يعيد clientSecret ونستخدم stripe.js هنا.
        if(order.clientSecret){
          log('الباك‑إند أعطى clientSecret (نمطي لـ Stripe). استدعاء SDK مزود الدفع مطلوب هنا.');
          if(window.Stripe){
            const stripe = Stripe(order.stripePublishableKey); // الباك‑إند يمكن أن يعيد المفتاح العام أو وضعه في HTML الآمن
            // مثال مختصر: تأكيد الدفع مع تفاصيل بطاقة تم جمعها بواسطة Elements (غير مبين هنا)
            const { error, paymentIntent } = await stripe.confirmCardPayment(order.clientSecret, {
              payment_method: { card: {/*...*/} }
            });
            if(error) throw error;
            log('دفع مكتمل: ' + JSON.stringify(paymentIntent));
            const complete = await finalizeOrder(order.id, paymentIntent.id);
            log('استجابة إتمام الطلب: '+JSON.stringify(complete));
            return;
          } else {
            log('Stripe.js غير محمّل في الصفحة. الباك‑إند يمكن أن يرد paymentUrl بدلاً من clientSecret للـ redirect.');
          }
        }

        // بديل عام: الباك‑إند أعطى paymentToken بعد عملية واجهة مزود الدفع المبهمة.
        if(order.paymentToken){
          log('إرسال paymentToken إلى /orders/:id/complete');
          const done = await finalizeOrder(order.id, order.paymentToken);
          log('النتيجة: ' + JSON.stringify(done));
          return;
        }

        // إن لم يكن هناك أي من الحلول أعلاه، اطلب من الباك‑إند الرد بصورة واضحة.
        throw new Error('الباك‑إند لم يُعِد وسيلة دفع صالحة (paymentUrl | clientSecret | paymentToken).');
      }catch(e){ log('فشل عملية الدفع: '+e.message); }
    });

    // ---- دالة مساعدة للسجل ----
    function log(msg){
      const el = document.getElementById('log');
      const now = new Date().toISOString();
      el.textContent = `[${now}] ${msg}\n` + el.textContent;
      console.log(msg);
    }

    // ---- AI proxy (مثال) ----
    async function callAi(prompt) {
      return apiFetch('/ai/proxy', {
        method:'POST',
        body: JSON.stringify({ prompt })
      });
    }

    // ملاحظات نهائية:
    // - الباك‑إند يجب أن يتحقق من الصلاحيات (JWT) لكل نقطة نهاية حساسة.
    // - الباك‑إند هو المسؤول عن توقيع upload requests إلى Cloudinary.
    // - الدفع يجب أن يتم عبر توكنيزاشن/مُباشرة مزوّد الدفع (لا ترسل بيانات البطاقة لخادميْن غير موثوقين).
  </script>
</body>
</html>
