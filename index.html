             <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">سوق فاتح الذكي | تسوق ذكي من كل العالم</title>
    <style>
        :root { --primary: #2563eb; --primary-hover: #1d4ed8; --dark: #0f172a; --light: #f8fafc; --gray: #64748b; --ali: #ff5722; --cj: #007bff; --amazon: #ff9900; --temu: #e02424; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--light); color: var(--dark); }
        /* أضف باقي الـ CSS الخاص بك هنا لضمان نفس الشكل */
    </style>
</head>
<body>

<div class="products-section">
    <h2 class="section-title" id="sectTitle">✨ المنتجات الموصى بها بالذكاء الاصطناعي</h2>
    <div class="products-grid" id="productsGrid">
        </div>
</div>

<script>
    // نظام الربط الذكي مع ملف المنتجات الخارجي
    let products = [];
    let cart = [];
    let currentSupplier = 'all';
    let currentLang = 'ar';

    // دالة جلب المنتجات من الملف التلقائي (البوت)
    async function fetchProducts() {
        try {
            const response = await fetch('products.json');
            products = await response.json();
            renderProducts();
        } catch (error) {
            console.error("خطأ في جلب البيانات، يرجى التأكد من وجود ملف products.json");
        }
    }

    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = '';
        const filtered = products.filter(p => (currentSupplier === 'all' || p.supplier === currentSupplier));

        filtered.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <span class="product-supplier-tag" style="background:${p.color}">${p.supplier.toUpperCase()}</span>
                <img src="${p.img}" class="product-img">
                <div class="product-info">
                    <h3 class="product-title">${p.title_ar}</h3>
                    <div class="product-meta">
                        <span class="product-price">${p.price}</span>
                        <button class="add-to-cart-btn" onclick="addToCart(${p.id})">أضف للسلة</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // تشغيل البوت عند التحميل
    window.onload = fetchProducts;
</script>
</body>
</html>
