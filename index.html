
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوق فاتح الذكي - Fateh Smart Market</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f9f9f9; }
        .header { background: #2c3e50; color: white; padding: 20px; text-align: center; }
        .store-benefits { display: flex; justify-content: space-around; padding: 15px; background: #ecf0f1; font-size: 14px; }
        .product-card { background: white; margin: 20px; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-buy { display: block; background: #e67e22; color: white; text-align: center; padding: 10px; text-decoration: none; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>سوق فاتح الذكي</h1>
    </div>

    <div class="store-benefits">
        <span>✅ منتجات مضمونة</span>
        <span>🚚 شحن سريع</span>
        <span>🛡️ دعم فني</span>
    </div>

    <div class="product-card">
        <h3>سماعات Lenovo TWS الأصلية</h3>
        <p>صوت عالي الجودة وباس قوي. مثالية للألعاب والرياضة.</p>
        <a href="#" class="btn-buy" onclick="redirectToProduct('https://s.click.aliexpress.com/e/_oE...')">شراء الآن</a>
    </div>

    <script>
        // هذا هو المخ الذكي للمتجر
        const affiliateConfig = {
            trackingId: "ضع_معرفك_هنا", // سنقوم بتحديثه فور وصول الموافقة
            isReady: false 
        };

        function redirectToProduct(productUrl) {
            // إذا تمت الموافقة، سنقوم بإضافة معرف التتبع للرابط
            let finalUrl = affiliateConfig.isReady ? productUrl + "&aff_id=" + affiliateConfig.trackingId : productUrl;
            window.location.href = finalUrl;
        }
    </script>
</body>
</html>
