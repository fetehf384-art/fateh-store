name: Run My Bot
on:
  workflow_dispatch:

permissions:
  contents: write  # هذا السطر يمنح البوت صلاحية الكتابة

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Run bot.py
        run: python bot.py
      - name: Commit result
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add bot_log.txt
          git commit -m "تحديث تلقائي من البوت"
          git push
