name: Run My Bot
on:
  workflow_dispatch:

permissions:
  contents: write  # هذا الإذن هو ما تحتاجه ليعمل البوت بعد تعديل الإعدادات

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Run bot.py
        run: python bot.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "البوت قام بتحديث الملفات بنجاح" || echo "لا توجد تغييرات للالتزام بها"
          git push
          
