name: Run My Bot
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Manual Setup and Run
        run: |
          # 1. تحديث النظام وتثبيت بايثون
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          
          # 2. تحميل ملفات المستودع
          git init
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch
          git checkout main
          
          # 3. تثبيت المكتبات وتشغيل البوت
          pip3 install requests beautifulsoup4
          python3 bot.py
          
          # 4. حفظ النتائج وتحديث المستودع
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "تحديث البوت التلقائي" || echo "لا توجد تغييرات"
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          
