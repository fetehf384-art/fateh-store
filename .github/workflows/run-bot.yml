name: Run My Bot
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # استخدام SHA الكامل بدلاً من v4 لتجاوز قفل الأمان
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      # استخدام SHA الكامل بدلاً من v5
      - uses: actions/setup-python@0b93645e5efa731d7a3e30f1469736561168925e
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install requests beautifulsoup4
        
      - name: Run bot.py
        run: python bot.py
        
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "تحديث تلقائي من البوت" || echo "لا توجد تغييرات للالتزام بها"
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          
