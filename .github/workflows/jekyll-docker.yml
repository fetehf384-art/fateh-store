name: Run My Bot
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Manual Execution
        run: |
          # 1. تثبيت المكتبات اللازمة
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install requests beautifulsoup4
          
          # 2. إعداد الهوية للـ git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 3. تحميل ملفات المستودع
          git clone https://github.com/${{ github.repository }}.git .
          
          # 4. تشغيل البوت
          python3 bot.py
          
          # 5. رفع النتائج
          git add bot_log.txt
          git commit -m "تحديث تلقائي من البوت" || echo "لا توجد تغييرات"
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          
